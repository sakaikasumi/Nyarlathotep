<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚空真理祭坛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020205; color: #a5b4fc; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        .nyar-glow { animation: pulse-glow 4s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        // -------------------------------------------------------------------
        // KP 注意：GitHub 部署前，请把控制台点击“复制部署参数”得到的内容粘贴到这里
        const MANUALLY_CONFIG = const MANUALLY_CONFIG = {"firebase":{"apiKey":"AIzaSyCqyCcs2R2e7AegGjvFAwG98wlamtbHvZY","authDomain":"bard-frontend.firebaseapp.com","projectId":"bard-frontend","storageBucket":"bard-frontend.firebasestorage.app","messagingSenderId":"175205271074","appId":"1:175205271074:web:2b7bd4d34d33bf38e6ec7b"},"appId":"c_10c0940001eb442e_nyar_kp_admin_v106.jsx-20"}; 
        // -------------------------------------------------------------------

        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, where, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FB_TOOLS = { doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, where, updateDoc, signInAnonymously, onAuthStateChanged };

        // 核心修复：自动切换环境逻辑
        let finalConfig = null;
        if (MANUALLY_CONFIG) {
            finalConfig = MANUALLY_CONFIG;
        } else if (typeof __firebase_config !== 'undefined') {
            finalConfig = { 
                firebase: JSON.parse(__firebase_config), 
                appId: typeof __app_id !== 'undefined' ? __app_id : 'nyar-dev' 
            };
        }

        if (finalConfig) {
            const app = initializeApp(finalConfig.firebase);
            window.db = getFirestore(app);
            window.auth = getAuth(app);
            window.appId = finalConfig.appId;
            window.isConfiged = true;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('LOADING');
            const [authData, setAuthData] = useState({ user: null, did: null });
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isThinking, setIsThinking] = useState(false);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.isConfiged && window.auth) {
                        clearInterval(check);
                        window.FB_TOOLS.onAuthStateChanged(window.auth, (u) => {
                            if (u) setView('LOGIN');
                            else window.FB_TOOLS.signInAnonymously(window.auth);
                        });
                    }
                }, 500);
            }, []);

            useEffect(() => {
                if (view !== 'CHAT' || !authData.did) return;
                const { query, collection, where, onSnapshot } = window.FB_TOOLS;
                const q = query(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'whispers'), where('targetId', '==', authData.did));
                return onSnapshot(q, (s) => {
                    const msgs = []; s.forEach(d => msgs.push(d.data()));
                    setMessages(msgs.sort((a, b) => a.ts - b.ts));
                });
            }, [view, authData.did]);

            const handleCopy = () => {
                const el = document.createElement('textarea');
                el.value = window.location.href.replace('blob:', '');
                document.body.appendChild(el); el.select();
                document.execCommand('copy'); document.body.removeChild(el);
                setCopied(true); setTimeout(() => setCopied(false), 2000);
            };

            const handleLogin = async (un, pw) => {
                const { doc, getDoc, setDoc } = window.FB_TOOLS;
                const userRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'players', un);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    if (snap.data().password === pw) {
                        setAuthData({ user: un, did: snap.data().discordId });
                        setView(snap.data().discordId ? 'CHAT' : 'BIND');
                    }
                } else {
                    await setDoc(userRef, { password: pw, discordId: null, online: true, ts: Date.now() });
                    setAuthData({ user: un, did: null });
                    setView('BIND');
                }
            };

            const handleBind = async (id) => {
                const cleaned = id.trim().toLowerCase();
                await window.FB_TOOLS.updateDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'players', authData.user), { discordId: cleaned });
                setAuthData(prev => ({ ...prev, did: cleaned }));
                setView('CHAT');
            };

            const sendMessage = async () => {
                if (!input.trim() || isThinking) return;
                const { addDoc, collection } = window.FB_TOOLS;
                const text = input; setInput(''); setIsThinking(true);
                await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'whispers'), { targetId: authData.did, author: authData.user, content: text, ts: Date.now(), type: 'player' });
                try {
                    const prompt = `你是奈亚拉托提普。当前沟通: ${authData.user}. 内容: "${text}". 语气傲慢。返回JSON {"reply": "..."}`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await res.json();
                    const aiReply = JSON.parse(data.candidates[0].content.parts[0].text).reply;
                    await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'whispers'), { targetId: authData.did, author: "Nyarlathotep", content: aiReply, ts: Date.now(), type: 'bot' });
                } catch (e) {}
                setIsThinking(false);
            };

            if (view === 'LOADING') return <div className="h-screen flex items-center justify-center bg-black text-indigo-950 font-black tracking-[1em] uppercase animate-pulse italic">Establishing Altar...</div>;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#020205] relative">
                    {/* 隐私图标：点击复制当前地址给 KP */}
                    {view !== 'CHAT' && (
                        <div className="fixed top-6 right-6 z-50">
                            <button onClick={handleCopy} className={`p-4 rounded-2xl glass transition-all ${copied ? 'text-emerald-500 scale-90' : 'text-zinc-900 hover:text-white'}`}>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    )}

                    {view === 'LOGIN' && (
                        <div className="w-full max-w-sm glass rounded-[3rem] p-12 space-y-10 animate-in zoom-in duration-700">
                            <div className="text-center italic font-black text-2xl uppercase tracking-tighter text-white">祭坛登录</div>
                            <div className="space-y-4">
                                <input type="text" id="un" className="w-full bg-black/40 border border-white/5 rounded-2xl px-6 py-5 text-white outline-none focus:border-indigo-500 transition-all shadow-inner" placeholder="凡人之名" />
                                <input type="password" id="pw" className="w-full bg-black/40 border border-white/5 rounded-2xl px-6 py-5 text-white outline-none focus:border-indigo-500 transition-all shadow-inner" placeholder="契约密钥" />
                                <button onClick={() => handleLogin(document.getElementById('un').value, document.getElementById('pw').value)} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase italic shadow-lg active:scale-95 transition-all">开启降临</button>
                            </div>
                        </div>
                    )}
                    {view === 'BIND' && (
                        <div className="w-full max-w-sm glass rounded-[3rem] p-12 space-y-10 animate-in slide-in-from-bottom-8 text-center">
                            <h2 className="text-2xl font-black italic uppercase text-white">身份锁定</h2>
                            <p className="text-xs text-zinc-500 italic opacity-60">Bind Discord Username</p>
                            <div className="space-y-4">
                                <input type="text" id="did" className="w-full bg-black/40 border border-white/5 rounded-2xl px-6 py-5 text-white text-center font-bold tracking-widest outline-none focus:border-indigo-500 transition-all" placeholder="Discord Username" />
                                <button onClick={() => handleBind(document.getElementById('did').value)} className="w-full py-5 bg-purple-600 text-white rounded-2xl font-black uppercase shadow-lg active:scale-95">确定契约</button>
                            </div>
                        </div>
                    )}
                    {view === 'CHAT' && (
                        <div className="w-full max-w-4xl h-[90vh] flex flex-col animate-in fade-in duration-1000">
                            <div className="flex items-center gap-4 mb-10 px-2">
                                <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg nyar-glow shadow-indigo-600/20 text-white italic font-black">N</div>
                                <div><h1 className="text-xl font-black italic uppercase text-white leading-none tracking-tighter">虚空真理祭坛</h1></div>
                            </div>
                            <div className="flex-1 glass rounded-[3.5rem] p-6 lg:p-10 overflow-y-auto mb-10 space-y-8 custom-scrollbar shadow-2xl">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex flex-col gap-2 ${m.type === 'bot' ? 'items-start' : 'items-end'}`}>
                                        <div className={`px-7 py-5 rounded-[2.5rem] text-sm leading-relaxed max-w-[88%] border shadow-xl ${m.type === 'bot' ? 'bg-indigo-900/10 border-indigo-500/20 text-indigo-100 italic' : 'bg-white/5 border-white/5 text-zinc-300'}`}>{m.content}</div>
                                    </div>
                                ))}
                                {isThinking && <div className="text-[10px] text-indigo-500 animate-pulse px-4 font-black">Nyarlathotep is piercing your mind...</div>}
                            </div>
                            <div className="relative">
                                <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} className="w-full bg-white/[0.03] border border-white/10 rounded-full px-12 py-7 pr-32 outline-none focus:border-indigo-500 text-white text-sm shadow-2xl transition-all" placeholder="在此低语，唯你可见..." />
                                <button onClick={sendMessage} className="absolute right-6 top-3 px-10 py-4 bg-indigo-600 text-white rounded-full font-black uppercase italic text-xs shadow-lg active:scale-95 transition-all">发送</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
