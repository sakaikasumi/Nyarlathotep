<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虚空真理祭坛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020205; color: #a5b4fc; margin: 0; touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        .nyar-glow { animation: pulse-glow 4s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        // -------------------------------------------------------------------
        // 已为你填好专属参数，请勿修改下面这一行！
        const MANUALLY_CONFIG = {"firebase":{"apiKey":"AIzaSyCqyCcs2R2e7AegGjvFAwG98wlamtbHvZY","authDomain":"bard-frontend.firebaseapp.com","projectId":"bard-frontend","storageBucket":"bard-frontend.firebasestorage.app","messagingSenderId":"175205271074","appId":"1:175205271074:web:2b7bd4d34d33bf38e6ec7b"},"appId":"c_10c0940001eb442e_nyar_kp_admin_v106.jsx-20"};
        // -------------------------------------------------------------------

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, where, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FB_TOOLS = { doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, where, updateDoc, signInAnonymously, onAuthStateChanged };

        if (MANUALLY_CONFIG && MANUALLY_CONFIG.firebase) {
            try {
                const app = initializeApp(MANUALLY_CONFIG.firebase);
                window.db = getFirestore(app);
                window.auth = getAuth(app);
                window.appId = MANUALLY_CONFIG.appId;
                window.isConfiged = true;
                console.log("Abyss Aligned Successfully.");
            } catch (e) {
                console.error("Config Error:", e);
            }
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('LOADING');
            const [authData, setAuthData] = useState({ user: null, did: null });
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isThinking, setIsThinking] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.isConfiged && window.auth) {
                        clearInterval(check);
                        window.FB_TOOLS.onAuthStateChanged(window.auth, (u) => {
                            if (u) setView('LOGIN');
                            else window.FB_TOOLS.signInAnonymously(window.auth);
                        });
                    }
                }, 1000);
                return () => clearInterval(check);
            }, []);

            useEffect(() => {
                if (view !== 'CHAT' || !authData.did) return;
                const { query, collection, where, onSnapshot } = window.FB_TOOLS;
                const q = query(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'whispers'), where('targetId', '==', authData.did));
                return onSnapshot(q, (s) => {
                    const msgs = []; s.forEach(d => msgs.push(d.data()));
                    setMessages(msgs.sort((a, b) => a.ts - b.ts));
                });
            }, [view, authData.did]);

            const handleLogin = async (un, pw) => {
                if(!un || !pw) return;
                const { doc, getDoc, setDoc } = window.FB_TOOLS;
                const userRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'players', un);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    if (snap.data().password === pw) {
                        setAuthData({ user: un, did: snap.data().discordId });
                        setView(snap.data().discordId ? 'CHAT' : 'BIND');
                    } else setError("密钥不匹配。");
                } else {
                    await setDoc(userRef, { password: pw, discordId: null, online: true, ts: Date.now() });
                    setAuthData({ user: un, did: null });
                    setView('BIND');
                }
            };

            const handleBind = async (id) => {
                const cleaned = id.trim().toLowerCase();
                await window.FB_TOOLS.updateDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'players', authData.user), { discordId: cleaned });
                setAuthData(prev => ({ ...prev, did: cleaned }));
                setView('CHAT');
            };

            const sendMessage = async () => {
                if (!input.trim() || isThinking) return;
                const text = input; setInput(''); setIsThinking(true);
                await window.FB_TOOLS.addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'whispers'), { targetId: authData.did, author: authData.user, content: text, ts: Date.now(), type: 'player' });
                try {
                    const prompt = `你是奈亚拉托提普。当前沟通: ${authData.user}. 内容: "${text}". 态度极其傲慢嘲弄。返回JSON回复 {"reply": "..."}`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await res.json();
                    const aiReply = JSON.parse(data.candidates[0].content.parts[0].text).reply;
                    await window.FB_TOOLS.addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'whispers'), { targetId: authData.did, author: "Nyarlathotep", content: aiReply, ts: Date.now(), type: 'bot' });
                } catch (e) {}
                setIsThinking(false);
            };

            if (view === 'LOADING') return <div className="h-screen flex items-center justify-center bg-black text-indigo-950 font-black tracking-[1em] uppercase animate-pulse italic">Establishing Link...</div>;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-[#020205] relative">
                    {view === 'LOGIN' && (
                        <div className="w-full max-w-sm glass rounded-[3.5rem] p-10 space-y-10 animate-in zoom-in duration-700">
                            <div className="text-center italic font-black text-2xl uppercase tracking-tighter text-white">祭坛登录</div>
                            <div className="space-y-4">
                                <input type="text" id="un" className="w-full bg-black/40 border border-white/5 rounded-2xl px-6 py-5 text-white outline-none focus:border-indigo-500 transition-all text-base" placeholder="凡人之名" />
                                <input type="password" id="pw" className="w-full bg-black/40 border border-white/5 rounded-2xl px-6 py-5 text-white outline-none focus:border-indigo-500 transition-all text-base" placeholder="契约密钥" />
                                {error && <p className="text-[10px] text-rose-500 text-center font-bold uppercase">{error}</p>}
                                <button onClick={() => handleLogin(document.getElementById('un').value, document.getElementById('pw').value)} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase italic shadow-lg active:scale-95 transition-all">开启降临</button>
                            </div>
                        </div>
                    )}
                    {view === 'BIND' && (
                        <div className="w-full max-w-sm glass rounded-[3.5rem] p-10 space-y-10 animate-in slide-in-from-bottom-8 text-center text-white">
                            <h2 className="text-2xl font-black italic uppercase">身份锁定</h2>
                            <div className="space-y-4">
                                <input type="text" id="did" className="w-full bg-black/40 border border-white/5 rounded-2xl px-6 py-5 text-white text-center font-bold tracking-widest outline-none focus:border-indigo-500 transition-all text-base" placeholder="Discord Username" />
                                <button onClick={() => handleBind(document.getElementById('did').value)} className="w-full py-5 bg-purple-600 text-white rounded-2xl font-black uppercase shadow-lg active:scale-95">确定契约</button>
                            </div>
                        </div>
                    )}
                    {view === 'CHAT' && (
                        <div className="w-full max-w-4xl h-[95vh] flex flex-col animate-in fade-in duration-1000">
                            <div className="flex items-center gap-4 mb-6 px-2">
                                <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg nyar-glow text-white italic font-black">N</div>
                                <h1 className="text-lg font-black italic uppercase text-white leading-none tracking-tighter">虚空真理祭坛</h1>
                            </div>
                            <div className="flex-1 glass rounded-[3.5rem] p-6 lg:p-10 overflow-y-auto mb-6 space-y-8 custom-scrollbar shadow-2xl">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex flex-col gap-2 ${m.type === 'bot' ? 'items-start' : 'items-end'}`}>
                                        <div className={`px-7 py-5 rounded-[2.5rem] text-sm leading-relaxed max-w-[90%] border shadow-xl ${m.type === 'bot' ? 'bg-indigo-900/15 border-indigo-500/20 text-indigo-100 italic' : 'bg-white/5 border-white/5 text-zinc-300'}`}>{m.content}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="relative">
                                <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} className="w-full bg-white/[0.03] border border-white/10 rounded-full px-12 py-7 pr-32 outline-none focus:border-indigo-500 text-white text-base shadow-2xl transition-all" placeholder="在此低语..." />
                                <button onClick={sendMessage} className="absolute right-4 top-3 px-10 py-4 bg-indigo-600 text-white rounded-full font-black uppercase italic text-sm shadow-lg active:scale-95 transition-all">发送</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
