<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虚空真理祭坛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020205; color: #a5b4fc; margin: 0; touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .nyar-glow { animation: pulse 4s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
        .loading-spinner { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #6366f1; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        // -------------------------------------------------------------------
        // 深渊契约：在此粘贴控制台金色按钮复制的参数
        const MANUALLY_CONFIG = {"firebase":{"apiKey":"AIzaSyCqyCcs2R2e7AegGjvFAwG98wlamtbHvZY","authDomain":"bard-frontend.firebaseapp.com","projectId":"bard-frontend","storageBucket":"bard-frontend.firebasestorage.app","messagingSenderId":"175205271074","appId":"1:175205271074:web:2b7bd4d34d33bf38e6ec7b"},"appId":"c_10c0940001eb442e_nyar_kp_admin_v120.jsx-503"};
        // -------------------------------------------------------------------

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, where, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FB = { doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, where, updateDoc, signInAnonymously, onAuthStateChanged };

        if (MANUALLY_CONFIG && MANUALLY_CONFIG.firebase) {
            try {
                const app = initializeApp(MANUALLY_CONFIG.firebase);
                window.db = getFirestore(app);
                window.auth = getAuth(app);
                window.appId = MANUALLY_CONFIG.appId;
                window.isConfiged = true;
                console.log("Aligned with Dimension ID:", window.appId);
            } catch(e) { console.error("Dimension Lock Fail"); }
        } else if (typeof __firebase_config !== 'undefined') {
            const app = initializeApp(JSON.parse(__firebase_config));
            window.db = getFirestore(app);
            window.auth = getAuth(app);
            window.appId = typeof __app_id !== 'undefined' ? __app_id : 'dev';
            window.isConfiged = true;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('LOADING');
            const [authData, setAuthData] = useState({ user: null, did: null });
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isAction, setIsAction] = useState(false);
            const [error, setError] = useState('');
            const [loadText, setLoadText] = useState('對齐维度中...');
            const scrollRef = useRef(null);

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.isConfiged && window.auth) {
                        clearInterval(check);
                        window.FB.onAuthStateChanged(window.auth, (u) => {
                            if (u) setView('LOGIN');
                            else {
                                setLoadText('正在建立深渊连接...');
                                window.FB.signInAnonymously(window.auth).catch(e => setError(`Denied (${e.code})`));
                            }
                        });
                    }
                }, 1000);
                return () => clearInterval(check);
            }, []);

            useEffect(() => {
                if (view !== 'CHAT' || !authData.did) return;
                const q = window.FB.query(window.FB.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'whispers'), window.FB.where('targetId', '==', authData.did));
                return window.FB.onSnapshot(q, (s) => {
                    const msgs = []; s.forEach(d => msgs.push(d.data()));
                    setMessages(msgs.sort((a, b) => a.ts - b.ts));
                });
            }, [view, authData.did]);

            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages]);

            const handleLogin = async (un, pw) => {
                if(!un || !pw || isAction) return;
                setIsAction(true); setError('');
                try {
                    const userRef = window.FB.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'players', un);
                    const snap = await window.FB.getDoc(userRef);
                    if (snap.exists()) {
                        if (snap.data().password === pw) {
                            setAuthData({ user: un, did: snap.data().discordId });
                            setView(snap.data().discordId ? 'CHAT' : 'BIND');
                        } else setError("灵魂密钥错误。");
                    } else {
                        await window.FB.setDoc(userRef, { password: pw, discordId: null, online: true, ts: Date.now() });
                        setAuthData({ user: un, did: null });
                        setView('BIND');
                    }
                } catch (e) { setError(`连接受阻 (${e.code})`); }
                setIsAction(false);
            };

            const handleBind = async (id) => {
                if(!id || isAction) return;
                setIsAction(true);
                const cleaned = id.trim().toLowerCase();
                await window.FB.updateDoc(window.FB.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'players', authData.user), { discordId: cleaned });
                setAuthData(prev => ({ ...prev, did: cleaned }));
                setView('CHAT');
                setIsAction(false);
            };

            const sendMessage = async () => {
                if (!input.trim() || isAction) return;
                const text = input; setInput(''); setIsAction(true);
                await window.FB.addDoc(window.FB.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'whispers'), { targetId: authData.did, author: authData.user, content: text, ts: Date.now(), type: 'player' });
                setIsAction(false);
            };

            if (view === 'LOADING') return (
                <div className="h-screen bg-black flex flex-col items-center justify-center space-y-6">
                    <div className="loading-spinner scale-150"></div>
                    <div className="text-indigo-900 font-black tracking-[1em] uppercase animate-pulse italic">{loadText}</div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#020205] relative select-none overflow-hidden">
                    {view === 'LOGIN' && (
                        <div className="w-full max-w-sm glass rounded-[3rem] p-12 space-y-10 animate-in zoom-in shadow-2xl">
                            <div className="text-center italic font-black text-3xl uppercase tracking-tighter text-white">祭坛降临</div>
                            <div className="space-y-4">
                                <input type="text" id="un" className="w-full bg-black/40 border border-white/5 rounded-2xl px-6 py-5 text-white outline-none focus:border-indigo-500 transition-all text-base shadow-inner" placeholder="凡人之名" />
                                <input type="password" id="pw" className="w-full bg-black/40 border border-white/5 rounded-2xl px-6 py-5 text-white outline-none focus:border-indigo-500 transition-all text-base shadow-inner" placeholder="契约密钥" />
                                {error && <p className="text-[10px] text-rose-500 text-center font-bold uppercase animate-bounce">{error}</p>}
                                <button onClick={() => handleLogin(document.getElementById('un').value, document.getElementById('pw').value)} disabled={isAction} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase italic shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                                    {isAction ? <><div className="loading-spinner"></div> 正在降临...</> : "开启祭坛"}
                                </button>
                            </div>
                        </div>
                    )}
                    {view === 'BIND' && (
                        <div className="w-full max-w-sm glass rounded-[3rem] p-10 space-y-10 text-center text-white animate-in slide-in-from-bottom-8">
                            <h2 className="text-2xl font-black italic uppercase">身份锁定</h2>
                            <div className="space-y-4">
                                <input type="text" id="did" className="w-full bg-black/40 border border-white/5 rounded-2xl px-6 py-5 text-white text-center font-bold tracking-widest outline-none focus:border-indigo-500" placeholder="Discord Username" />
                                <button onClick={() => handleBind(document.getElementById('did').value)} disabled={isAction} className="w-full py-5 bg-purple-600 text-white rounded-2xl font-black uppercase shadow-lg">确定契约</button>
                            </div>
                        </div>
                    )}
                    {view === 'CHAT' && (
                        <div className="w-full max-w-4xl h-[95vh] flex flex-col animate-in fade-in">
                            <div className="flex items-center gap-4 mb-6 px-2">
                                <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg nyar-glow text-white italic font-black text-xl">N</div>
                                <h1 className="text-xl font-black italic uppercase text-white leading-none">虚空真理祭坛</h1>
                            </div>
                            <div ref={scrollRef} className="flex-1 glass rounded-[3.5rem] p-6 lg:p-10 overflow-y-auto mb-10 space-y-8 custom-scrollbar shadow-2xl">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex flex-col gap-2 ${m.type === 'bot' ? 'items-start' : 'items-end'}`}>
                                        <div className={`px-7 py-5 rounded-[2.5rem] text-sm leading-relaxed max-w-[90%] border shadow-xl ${m.type === 'bot' ? 'bg-indigo-900/15 border-indigo-500/20 text-indigo-100 italic' : 'bg-white/5 border-white/5 text-zinc-300'}`}>{m.content}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="relative group px-2">
                                <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} className="w-full bg-white/[0.03] border border-white/10 rounded-full px-12 py-7 pr-32 outline-none focus:border-indigo-500 text-white text-base shadow-2xl transition-all" placeholder="在此低语..." />
                                <button onClick={sendMessage} className="absolute right-4 top-3 px-10 py-4 bg-indigo-600 text-white rounded-full font-black uppercase italic text-sm active:scale-95 shadow-lg">发送</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
